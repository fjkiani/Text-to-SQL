name: Evaluation & Regression Check

on:
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'data/dev_questions_with_answers.json'
      - '.github/workflows/eval.yml'
  pull_request:
    branches: [main]
    paths:
      - 'src/**'
      - 'data/dev_questions_with_answers.json'

jobs:
  eval:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Install dependencies
        run: uv sync

      - name: Download Chinook database
        run: ./setup.sh

      - name: Run CI evaluation
        env:
          FIREWORKS_API_KEY: ${{ secrets.FIREWORKS_API_KEY }}
        run: |
          uv run python -m src.ci_eval \
            --min-exec-accuracy 1.0 \
            --min-match-accuracy 0.80 \
            --max-p50-latency 3.0

      - name: Upload eval artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: eval-results
          path: |
            eval_report.json
            dev_answers.json
            eval_baseline.json
